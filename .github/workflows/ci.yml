name: DevOps Inter CI
# Trigger the workfolw on every push to the main branch
on:
push:
branches: [main]
pull_request:
branches: [main]

jobs:
build-and-run:
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/setup-python@v4
with:
python-version: '3.11'
- name: Run hello.py
run: python hello.py
